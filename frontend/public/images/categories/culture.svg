<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0.8">
      <stop offset="0%" stop-color="#6E2882"/>
      <stop offset="100%" stop-color="#3E1550"/>
    </linearGradient>
    <pattern id="diamonds" width="50" height="50" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="50" height="50" fill="none"/>
      <rect x="24" y="24" width="2" height="2" fill="rgba(255,255,255,0.03)"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#diamonds)"/>
  <!-- Stained glass window (abstract) -->
  <g transform="translate(400,240)">
    <!-- Outer arch -->
    <path d="M-70 80 L-70 -20 Q-70 -80 0 -80 Q70 -80 70 -20 L70 80" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
    <!-- Inner panels -->
    <path d="M-50 70 L-50 -10 Q-50 -60 0 -60 Q50 -60 50 -10 L50 70" fill="rgba(201,169,110,0.04)"/>
    <!-- Vertical dividers -->
    <line x1="0" y1="-60" x2="0" y2="70" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <!-- Horizontal dividers -->
    <line x1="-48" y1="10" x2="48" y2="10" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <line x1="-45" y1="40" x2="45" y2="40" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <!-- Rose circle -->
    <circle cx="0" cy="-30" r="18" fill="rgba(201,169,110,0.08)" stroke="rgba(201,169,110,0.15)" stroke-width="1"/>
    <!-- Inner cross in rose -->
    <line x1="0" y1="-42" x2="0" y2="-18" stroke="rgba(201,169,110,0.12)" stroke-width="0.8"/>
    <line x1="-12" y1="-30" x2="12" y2="-30" stroke="rgba(201,169,110,0.12)" stroke-width="0.8"/>
    <!-- Color panels (subtle tints) -->
    <rect x="-46" y="12" width="44" height="26" rx="2" fill="rgba(27,64,128,0.08)"/>
    <rect x="2" y="12" width="44" height="26" rx="2" fill="rgba(139,26,26,0.08)"/>
    <rect x="-43" y="42" width="40" height="26" rx="2" fill="rgba(26,107,64,0.08)"/>
    <rect x="3" y="42" width="40" height="26" rx="2" fill="rgba(201,169,110,0.06)"/>
  </g>
  <text x="400" y="420" text-anchor="middle" font-family="serif" font-size="42" font-weight="700" fill="rgba(255,255,255,0.85)" letter-spacing="0.15em">문화</text>
  <text x="400" y="455" text-anchor="middle" font-family="monospace" font-size="13" fill="rgba(201,169,110,0.6)" letter-spacing="0.3em">CULTURE</text>
</svg>
