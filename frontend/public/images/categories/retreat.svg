<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B4080"/>
      <stop offset="100%" stop-color="#0F2850"/>
    </linearGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="rgba(255,255,255,0.06)"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#dots)"/>
  <!-- Mountains -->
  <path d="M0 600 L200 340 L320 420 L480 280 L600 380 L800 260 L800 600Z" fill="rgba(255,255,255,0.04)"/>
  <path d="M0 600 L150 400 L280 460 L420 350 L560 430 L700 320 L800 380 L800 600Z" fill="rgba(255,255,255,0.03)"/>
  <!-- Cross -->
  <rect x="376" y="160" width="48" height="200" rx="6" fill="rgba(255,255,255,0.12)"/>
  <rect x="326" y="200" width="148" height="48" rx="6" fill="rgba(255,255,255,0.12)"/>
  <!-- Glow -->
  <circle cx="400" cy="240" r="80" fill="rgba(201,169,110,0.08)"/>
  <!-- Label -->
  <text x="400" y="440" text-anchor="middle" font-family="serif" font-size="42" font-weight="700" fill="rgba(255,255,255,0.85)" letter-spacing="0.15em">피정</text>
  <text x="400" y="475" text-anchor="middle" font-family="monospace" font-size="13" fill="rgba(201,169,110,0.6)" letter-spacing="0.3em">RETREAT</text>
</svg>
