<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B6B70"/>
      <stop offset="100%" stop-color="#064345"/>
    </linearGradient>
    <pattern id="circles" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="40" cy="40" r="30" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#circles)"/>
  <!-- Community figures (abstract) -->
  <g transform="translate(400,240)" opacity="0.9">
    <!-- Center figure -->
    <circle cx="0" cy="-30" r="14" fill="rgba(255,255,255,0.1)"/>
    <path d="M-16 10 Q0 -10 16 10 L12 45 L-12 45 Z" fill="rgba(255,255,255,0.08)"/>
    <!-- Left figure -->
    <circle cx="-55" cy="-20" r="12" fill="rgba(255,255,255,0.07)"/>
    <path d="M-69 5 Q-55 -8 -41 5 L-44 38 L-66 38 Z" fill="rgba(255,255,255,0.06)"/>
    <!-- Right figure -->
    <circle cx="55" cy="-20" r="12" fill="rgba(255,255,255,0.07)"/>
    <path d="M41 5 Q55 -8 69 5 L66 38 L44 38 Z" fill="rgba(255,255,255,0.06)"/>
    <!-- Connecting arcs -->
    <path d="M-30 0 Q0 -30 30 0" fill="none" stroke="rgba(201,169,110,0.15)" stroke-width="1" stroke-dasharray="3 3"/>
    <path d="M-50 10 Q-25 -20 0 10" fill="none" stroke="rgba(201,169,110,0.1)" stroke-width="1" stroke-dasharray="3 3"/>
    <path d="M0 10 Q25 -20 50 10" fill="none" stroke="rgba(201,169,110,0.1)" stroke-width="1" stroke-dasharray="3 3"/>
  </g>
  <!-- Cross above -->
  <rect x="396" y="140" width="8" height="40" rx="2" fill="rgba(201,169,110,0.12)"/>
  <rect x="386" y="150" width="28" height="8" rx="2" fill="rgba(201,169,110,0.12)"/>
  <text x="400" y="420" text-anchor="middle" font-family="serif" font-size="42" font-weight="700" fill="rgba(255,255,255,0.85)" letter-spacing="0.15em">청년</text>
  <text x="400" y="455" text-anchor="middle" font-family="monospace" font-size="13" fill="rgba(201,169,110,0.6)" letter-spacing="0.3em">YOUTH</text>
</svg>
