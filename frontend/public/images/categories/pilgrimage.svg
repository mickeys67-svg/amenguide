<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7B5230"/>
      <stop offset="100%" stop-color="#4A2F1A"/>
    </linearGradient>
    <pattern id="noise" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="25" r="0.8" fill="rgba(255,255,255,0.04)"/>
      <circle cx="55" cy="65" r="0.6" fill="rgba(255,255,255,0.03)"/>
      <circle cx="85" cy="15" r="0.7" fill="rgba(255,255,255,0.04)"/>
      <circle cx="35" cy="85" r="0.5" fill="rgba(255,255,255,0.03)"/>
      <circle cx="75" cy="45" r="0.6" fill="rgba(255,255,255,0.03)"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#noise)"/>
  <!-- Winding path -->
  <path d="M400 450 Q380 400 420 360 Q460 320 400 280 Q340 240 380 200 Q420 160 400 120" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 6"/>
  <!-- Path glow -->
  <path d="M400 450 Q380 400 420 360 Q460 320 400 280 Q340 240 380 200 Q420 160 400 120" fill="none" stroke="rgba(201,169,110,0.06)" stroke-width="20" stroke-linecap="round"/>
  <!-- Shell (Camino symbol) -->
  <g transform="translate(400,100)">
    <path d="M0 -25 Q-20 0 0 25 Q20 0 0 -25" fill="rgba(201,169,110,0.15)" stroke="rgba(201,169,110,0.3)" stroke-width="1"/>
    <line x1="0" y1="-20" x2="-8" y2="20" stroke="rgba(201,169,110,0.15)" stroke-width="0.5"/>
    <line x1="0" y1="-20" x2="0" y2="22" stroke="rgba(201,169,110,0.15)" stroke-width="0.5"/>
    <line x1="0" y1="-20" x2="8" y2="20" stroke="rgba(201,169,110,0.15)" stroke-width="0.5"/>
  </g>
  <!-- Footsteps -->
  <circle cx="395" cy="420" r="3" fill="rgba(255,255,255,0.08)"/>
  <circle cx="410" cy="400" r="3" fill="rgba(255,255,255,0.07)"/>
  <circle cx="405" cy="370" r="3" fill="rgba(255,255,255,0.06)"/>
  <text x="400" y="520" text-anchor="middle" font-family="serif" font-size="42" font-weight="700" fill="rgba(255,255,255,0.85)" letter-spacing="0.15em">순례</text>
  <text x="400" y="555" text-anchor="middle" font-family="monospace" font-size="13" fill="rgba(201,169,110,0.6)" letter-spacing="0.3em">PILGRIMAGE</text>
</svg>
